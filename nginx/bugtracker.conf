server {
    listen 80;
    server_name bugtracker.sytes.net;

    # redirect HTTP -> HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name bugtracker.sytes.net;

    ssl_certificate     /etc/letsencrypt/live/bugtracker.sytes.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bugtracker.sytes.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/bugtracker;
    index index.html;

    # proxy /api/* -> backend (strip /api prefix)
    location /api/ {
        proxy_pass         http://127.0.0.1:8081/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA fallback — все остальное отдаем index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
