version: '3.8'

services:
  postgres_db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    env_file:
      - ./TaskTrackerBackend/docker/.env
    volumes:
      - ./TaskTrackerBackend/migrations/000001_init.up.sql:/docker-entrypoint-initdb.d/000001_init.up.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bug_tracker_network
    restart: unless-stopped

  app:
    build:
      context: ./TaskTrackerBackend
      dockerfile: docker/dockerfile
    ports:
      - "8081:8081"
    env_file:
      - ./TaskTrackerBackend/docker/.env
    depends_on:
      - postgres_db
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
    volumes:
      - uploads_data:/root/uploads
    networks:
      - bug_tracker_network
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:

networks:
  bug_tracker_network:
    driver: bridge
