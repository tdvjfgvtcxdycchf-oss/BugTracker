services:
  postgres_db:
    image: postgres:17
    env_file:
      - ./TaskTrackerBackend/docker/.env
    volumes:
      - ./TaskTrackerBackend/migrations/000001_init.up.sql:/docker-entrypoint-initdb.d/000001_init.up.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bug_tracker_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  app:
    build:
      context: ./TaskTrackerBackend
      dockerfile: docker/dockerfile
    ports:
      - "8081:8081"
    env_file:
      - ./TaskTrackerBackend/docker/.env
    depends_on:
      postgres_db:
        condition: service_healthy
    volumes:
      - uploads_data:/root/uploads
    networks:
      - bug_tracker_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  postgres_data:
  uploads_data:

networks:
  bug_tracker_network:
    driver: bridge
